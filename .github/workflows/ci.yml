name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: Lint · Typecheck · Unit tests · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Dummy values — apps read Supabase at request time, not build time.
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:55321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
          NEXT_PUBLIC_APP_NAME: Leavicy CI

  coverage:
    name: Patch coverage (≥ 90% on changed code)
    # Patch coverage needs a base to diff against, so PRs only.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so diff-cover can compare against the base branch.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Compute patch coverage
        id: patch
        run: |
          pipx install diff-cover
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          set +e
          diff-cover coverage/cobertura-coverage.xml \
            --compare-branch="origin/${{ github.base_ref }}" \
            --fail-under=90 \
            --markdown-report=coverage-patch.md
          echo "rc=$?" >> "$GITHUB_OUTPUT"
          set -e
          # Mirror the report into the job summary for quick viewing.
          cat coverage-patch.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment patch coverage on PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: patch-coverage
          path: coverage-patch.md

      - name: Enforce 90% patch coverage
        if: steps.patch.outputs.rc != '0'
        run: |
          echo "::error::Patch coverage is below 90% on the changed code."
          exit 1

  integration:
    name: Integration tests (live Supabase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          # Pinned (not `latest`) so a floating CLI release can't break CI.
          version: 2.107.0
        env:
          # Raises the GitHub API rate limit (60 → 5,000/h) so resolving the
          # CLI release doesn't fail on shared CI runners.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Supabase (applies migrations + seed)
        # Exclude edge-runtime: the project ships no edge functions, and its
        # container has been failing its health check (502) on CI runners.
        run: supabase start -x edge-runtime

      - name: Run integration tests
        run: |
          set -a
          eval "$(supabase status -o env)"
          set +a
          SUPABASE_URL="${API_URL}" \
          SUPABASE_ANON_KEY="${ANON_KEY}" \
          SUPABASE_SECRET_KEY="${SERVICE_ROLE_KEY}" \
          pnpm test:integration

      - name: Verify RLS / tenant isolation (verify:rls)
        # Cross-tenant isolation smoke test against the seeded local DB.
        run: pnpm verify:rls

      - name: Check generated DB types are up to date
        # Regenerates from the live schema; fails if a migration changed the
        # schema without `pnpm db:types` being re-run and committed.
        run: |
          # `gen types` spins up a one-off postgres-meta container; retry to
          # ride out transient ECR public Docker pull rate limits on CI runners.
          n=0
          until pnpm db:types; do
            n=$((n + 1))
            if [ "$n" -ge 3 ]; then
              echo "::error::pnpm db:types failed after 3 attempts (Docker pull rate limit?)."
              exit 1
            fi
            echo "db:types attempt $n failed; retrying in 30s..."
            sleep 30
          done
          git diff --exit-code packages/database/src/database.types.ts \
            || { echo "::error::database.types.ts is stale — run 'pnpm db:types' and commit."; exit 1; }

      - name: Stop Supabase
        if: always()
        run: supabase stop

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          # Pinned (not `latest`) so a floating CLI release can't break CI.
          version: 2.107.0
        env:
          # Raises the GitHub API rate limit (60 → 5,000/h) so resolving the
          # CLI release doesn't fail on shared CI runners.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Supabase (applies migrations + seed)
        # Exclude edge-runtime: the project ships no edge functions, and its
        # container has been failing its health check (502) on CI runners.
        run: supabase start -x edge-runtime

      - name: Install Playwright browsers
        run: pnpm --filter @repo/e2e-tests exec playwright install --with-deps chromium

      - name: Build portal
        run: |
          set -a
          eval "$(supabase status -o env)"
          set +a
          export NEXT_PUBLIC_SUPABASE_URL="${API_URL}"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="${ANON_KEY}"
          export NEXT_PUBLIC_APP_NAME="Leavicy Portal"
          export SUPABASE_SECRET_KEY="${SERVICE_ROLE_KEY}"
          pnpm --filter portal build

      - name: Verify auth / RBAC guards (verify:auth)
        # Hits the running portal as different roles to assert route guards.
        # Runs its own portal instance and frees :3560 before Playwright starts.
        run: |
          set -a
          eval "$(supabase status -o env)"
          set +a
          export NEXT_PUBLIC_APP_NAME="Leavicy Portal"
          export SUPABASE_SECRET_KEY="${SERVICE_ROLE_KEY}"
          pnpm --filter portal start &
          # Wait until the portal accepts connections (max ~120s).
          for _ in $(seq 1 60); do
            curl -sf http://127.0.0.1:3560 >/dev/null 2>&1 && break
            sleep 2
          done
          set +e
          pnpm verify:auth
          rc=$?
          set -e
          # Free port 3560 so Playwright can bind its own server (no reuse in CI).
          fuser -k 3560/tcp 2>/dev/null || true
          exit $rc

      - name: Run E2E (Playwright)
        run: |
          set -a
          eval "$(supabase status -o env)"
          set +a
          export NEXT_PUBLIC_SUPABASE_URL="${API_URL}"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="${ANON_KEY}"
          export NEXT_PUBLIC_APP_NAME="Leavicy Portal"
          export SUPABASE_SECRET_KEY="${SERVICE_ROLE_KEY}"
          pnpm test:e2e

      - name: Upload Playwright report & videos
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: supabase stop
