name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: Lint · Typecheck · Unit tests · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Dummy values — apps read Supabase at request time, not build time.
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:55321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
          NEXT_PUBLIC_APP_NAME: Leavicy CI

  integration:
    name: Integration tests (live Supabase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (applies migrations + seed)
        run: supabase start

      - name: Run integration tests
        run: |
          set -a
          eval "$(supabase status -o env)"
          set +a
          SUPABASE_URL="${API_URL}" \
          SUPABASE_ANON_KEY="${ANON_KEY}" \
          SUPABASE_SECRET_KEY="${SERVICE_ROLE_KEY}" \
          pnpm test:integration

      - name: Stop Supabase
        if: always()
        run: supabase stop

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (applies migrations + seed)
        run: supabase start

      - name: Install Playwright browsers
        run: pnpm --filter @repo/e2e-tests exec playwright install --with-deps chromium

      - name: Build portal & run E2E
        run: |
          set -a
          eval "$(supabase status -o env)"
          set +a
          export NEXT_PUBLIC_SUPABASE_URL="${API_URL}"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="${ANON_KEY}"
          export NEXT_PUBLIC_APP_NAME="Leavicy Portal"
          export SUPABASE_SECRET_KEY="${SERVICE_ROLE_KEY}"
          pnpm --filter portal build
          pnpm test:e2e

      - name: Upload Playwright report & videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: supabase stop
