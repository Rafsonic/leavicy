name: Secret scan

# Scans the repo + full git history for leaked secrets (Supabase service-role
# keys, Resend API keys, .env files, etc.). PII project — a leaked key is a
# GDPR-relevant incident, so this blocks on any finding.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Mondays at 06:00 UTC — catches secrets in history even without a new commit.
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so historical commits are scanned, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
